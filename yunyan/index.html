<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>云研 ELN</title>

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              mono: [
                "ui-monospace",
                "SFMono-Regular",
                "Menlo",
                "Monaco",
                "Consolas",
                "Liberation Mono",
                "Courier New",
                "monospace",
              ],
            },
            boxShadow: {
              glow: "0 0 0 1px rgba(99,102,241,.5), 0 0 30px rgba(99,102,241,.22)",
            },
            keyframes: {
              shimmer: {
                "0%": { backgroundPosition: "-200% 0" },
                "100%": { backgroundPosition: "200% 0" },
              },
              pulseRing: {
                "0%": { transform: "scale(.85)", opacity: ".55" },
                "60%": { transform: "scale(1.2)", opacity: ".25" },
                "100%": { transform: "scale(1.35)", opacity: "0" },
              },
            },
            animation: {
              shimmer: "shimmer 2.2s linear infinite",
              pulseRing: "pulseRing 1.4s ease-out infinite",
            },
          },
        },
      };
    </script>

    <style>
      html,
      body {
        height: 100%;
        background: #070a12;
      }
      /* 极简极客：细网格背景 */
      .grid-bg {
        background-image: linear-gradient(
            rgba(255, 255, 255, 0.04) 1px,
            transparent 1px
          ),
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        background-size: 28px 28px;
      }
      /* 滚动条更克制 */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        border: 2px solid rgba(0, 0, 0, 0);
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.04);
      }
      /* 虚拟鼠标光标 */
      .demo-cursor {
        position: fixed;
        top: 0;
        left: 0;
        width: 20px;
        height: 20px;
        transform: translate(-100px, -100px);
        z-index: 999999;
        pointer-events: none;
      }
      .demo-cursor:before {
        content: "";
        position: absolute;
        width: 18px;
        height: 18px;
        border-radius: 999px;
        background: rgba(99, 102, 241, 0.85);
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.25),
          0 0 30px rgba(99, 102, 241, 0.35);
      }
      .demo-cursor:after {
        content: "";
        position: absolute;
        left: 14px;
        top: 12px;
        width: 0;
        height: 0;
        border-left: 10px solid rgba(255, 255, 255, 0.85);
        border-top: 6px solid transparent;
        border-bottom: 6px solid transparent;
        filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.25));
        transform: rotate(-18deg);
      }
      .demo-click {
        position: fixed;
        width: 22px;
        height: 22px;
        border-radius: 999px;
        border: 2px solid rgba(99, 102, 241, 0.9);
        z-index: 999998;
        pointer-events: none;
        transform: translate(-100px, -100px);
        opacity: 0;
      }
      .demo-toast {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 999997;
        pointer-events: none;
        max-width: min(520px, calc(100vw - 32px));
      }
      .demo-toast > div {
        background: rgba(10, 14, 24, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.09);
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.03),
          0 20px 60px rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(12px);
      }
      /* 引导时的元素高亮框 */
      .demo-spotlight {
        position: absolute;
        inset: -6px;
        border-radius: 14px;
        border: 1px solid rgba(99, 102, 241, 0.5);
        box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.18),
          0 0 40px rgba(99, 102, 241, 0.18);
        pointer-events: none;
      }
      .demo-ring {
        position: absolute;
        inset: -12px;
        border-radius: 16px;
        border: 2px solid rgba(99, 102, 241, 0.22);
        pointer-events: none;
      }
    </style>
  </head>

  <body class="text-slate-100 font-mono grid-bg">
    <div id="root"></div>

    <!-- React 18 + ReactDOM 18 (UMD) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <!-- Babel (in-browser JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;

      const PAGES = [
        { id: "dashboard", name: "工作台看板" },
        { id: "newExp", name: "新建实验" },
        { id: "login", name: "登录" },
        { id: "register", name: "注册" },
        { id: "landing", name: "产品官网Landing" },
        { id: "projects", name: "项目管理" },
        { id: "projectDetail", name: "项目详情" },
        { id: "records", name: "实验记录列表" },
        { id: "recordReadonly", name: "实验只读预览" },
        { id: "analytics", name: "数据图表分析" },
        { id: "docs", name: "文档资料库" },
        { id: "sop", name: "SOP模板库" },
        { id: "team", name: "团队成员管理" },
        { id: "rbac", name: "权限配置" },
        { id: "audit", name: "操作日志" },
        { id: "inbox", name: "站内信通知" },
        { id: "prefs", name: "个人偏好" },
        { id: "security", name: "账号安全" },
        { id: "storage", name: "存储空间分析" },
        { id: "helpdesk", name: "帮助文档工单" },
      ];

      function cx(...xs) {
        return xs.filter(Boolean).join(" ");
      }

      function Badge({ children, tone = "indigo" }) {
        const map = {
          indigo: "bg-indigo-500/10 text-indigo-200 border-indigo-400/20",
          emerald: "bg-emerald-500/10 text-emerald-200 border-emerald-400/20",
          amber: "bg-amber-500/10 text-amber-200 border-amber-400/20",
          rose: "bg-rose-500/10 text-rose-200 border-rose-400/20",
          slate: "bg-slate-500/10 text-slate-200 border-slate-400/20",
        };
        return (
          <span
            className={cx(
              "inline-flex items-center gap-2 rounded-full border px-3 py-1 text-xs",
              map[tone] || map.indigo
            )}
          >
            <span className="h-1.5 w-1.5 rounded-full bg-current opacity-70"></span>
            {children}
          </span>
        );
      }

      function Card({ title, right, children }) {
        return (
          <div className="rounded-2xl border border-white/10 bg-slate-950/60 backdrop-blur p-4 shadow-[0_0_0_1px_rgba(255,255,255,.03)]">
            <div className="flex items-center justify-between gap-3">
              <div className="text-sm text-slate-200">{title}</div>
              {right ? <div className="text-xs text-slate-400">{right}</div> : null}
            </div>
            <div className="mt-4">{children}</div>
          </div>
        );
      }

      function TreeSection({ title, children, defaultOpen = true }) {
        const [open, setOpen] = useState(defaultOpen);
        return (
          <div className="mt-2">
            <button
              className="w-full flex items-center justify-between rounded-lg px-2 py-2 text-left text-xs text-slate-300 hover:bg-white/5"
              onClick={() => setOpen((v) => !v)}
              type="button"
            >
              <span className="tracking-wide">{title}</span>
              <span className="text-slate-500">{open ? "—" : "+"}</span>
            </button>
            {open ? <div className="mt-1 space-y-1">{children}</div> : null}
          </div>
        );
      }

      function NavItem({ active, label, onClick, idForDemo }) {
        return (
          <button
            id={idForDemo}
            type="button"
            onClick={onClick}
            className={cx(
              "w-full rounded-xl px-3 py-2 text-left text-sm transition border",
              active
                ? "bg-white/8 border-indigo-400/25 shadow-glow text-white"
                : "bg-transparent border-white/0 text-slate-300 hover:bg-white/5 hover:border-white/10"
            )}
          >
            <div className="flex items-center justify-between gap-3">
              <span className="truncate">{label}</span>
              {active ? (
                <span className="text-[10px] text-indigo-200/90">ACTIVE</span>
              ) : null}
            </div>
          </button>
        );
      }

      function RichTextMock({ value, onChange, placeholder = "在此输入实验步骤、观察与结论…" }) {
        const ref = useRef(null);
        useEffect(() => {
          if (!ref.current) return;
          if (ref.current.innerHTML !== value) {
            ref.current.innerHTML = value || "";
          }
        }, [value]);

        return (
          <div className="rounded-2xl border border-white/10 bg-black/30">
            <div className="flex items-center justify-between px-3 py-2 border-b border-white/10">
              <div className="text-xs text-slate-300">富文本编辑器</div>
              <div className="flex items-center gap-2 text-[10px] text-slate-500">
                <span className="px-2 py-1 rounded-lg border border-white/10 bg-white/5">
                  Ctrl/Cmd + B
                </span>
                <span className="px-2 py-1 rounded-lg border border-white/10 bg-white/5">
                  Ctrl/Cmd + I
                </span>
              </div>
            </div>
            <div
              ref={ref}
              contentEditable
              suppressContentEditableWarning
              className="min-h-[180px] px-3 py-3 text-sm leading-relaxed text-slate-100 outline-none"
              onInput={(e) => onChange(e.currentTarget.innerHTML)}
              onKeyDown={(e) => {
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "b") {
                  e.preventDefault();
                  document.execCommand("bold");
                }
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "i") {
                  e.preventDefault();
                  document.execCommand("italic");
                }
              }}
              data-placeholder={placeholder}
              style={{
                caretColor: "rgb(165 180 252)",
              }}
            />
            <style>
              {`
                [contenteditable][data-placeholder]:empty:before {
                  content: attr(data-placeholder);
                  color: rgba(148,163,184,.65);
                }
              `}
            </style>
          </div>
        );
      }

      function Dropzone({ idForDemo, files, setFiles, uploading, setUploading }) {
        const [hover, setHover] = useState(false);
        const [progress, setProgress] = useState(0);
        const inputRef = useRef(null);

        function fakeUpload(newFiles) {
          setUploading(true);
          setProgress(0);
          const start = Date.now();
          const duration = 4200;
          const tick = () => {
            const t = Math.min(1, (Date.now() - start) / duration);
            const eased = 1 - Math.pow(1 - t, 3);
            setProgress(Math.round(eased * 100));
            if (t < 1) requestAnimationFrame(tick);
            else {
              setUploading(false);
            }
          };
          requestAnimationFrame(tick);
          setFiles((prev) => [...prev, ...newFiles]);
        }

        // 让 onboarding 能触发真实的“上传进度条”
        useEffect(() => {
          const onDemoUpload = (e) => {
            const demoFiles = (e.detail?.files || []).map((f) => ({
              name: f.name,
              size: f.size,
            }));
            if (!demoFiles.length) return;
            fakeUpload(demoFiles);
          };
          window.addEventListener("yunyan_demo_upload", onDemoUpload);
          return () => window.removeEventListener("yunyan_demo_upload", onDemoUpload);
          // eslint-disable-next-line react-hooks/exhaustive-deps
        }, []);

        const onDrop = (e) => {
          e.preventDefault();
          setHover(false);
          const dropped = Array.from(e.dataTransfer.files || []);
          if (dropped.length) fakeUpload(dropped);
        };

        return (
          <div className="space-y-3">
            <div
              id={idForDemo}
              className={cx(
                "rounded-2xl border border-dashed p-4 transition relative overflow-hidden",
                hover
                  ? "border-indigo-300/60 bg-indigo-500/10"
                  : "border-white/12 bg-black/20"
              )}
              onDragOver={(e) => {
                e.preventDefault();
                setHover(true);
              }}
              onDragLeave={() => setHover(false)}
              onDrop={onDrop}
            >
              <div className="flex items-start justify-between gap-4">
                <div>
                  <div className="text-sm text-slate-100">拖拽上传</div>
                  <div className="mt-1 text-xs text-slate-400">
                    支持图表/数据文件（上传将显示进度并写入附件列表）
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  <button
                    type="button"
                    className="rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-xs text-slate-200 hover:bg-white/10"
                    onClick={() => inputRef.current?.click()}
                    disabled={uploading}
                  >
                    选择文件
                  </button>
                  <input
                    ref={inputRef}
                    className="hidden"
                    type="file"
                    accept=".csv,.xlsx,.png,.jpg,.jpeg,.json,.txt"
                    multiple
                    onChange={(e) => {
                      const picked = Array.from(e.target.files || []);
                      if (picked.length) fakeUpload(picked);
                      e.target.value = "";
                    }}
                  />
                </div>
              </div>

              {uploading ? (
                <div className="mt-4">
                  <div className="flex items-center justify-between text-[11px] text-slate-400">
                    <span>上传中…</span>
                    <span>{progress}%</span>
                  </div>
                  <div className="mt-2 h-2 rounded-full bg-white/10 overflow-hidden">
                    <div
                      className="h-2 rounded-full bg-indigo-400/80"
                      style={{ width: `${progress}%` }}
                    ></div>
                  </div>
                </div>
              ) : null}

              <div className="pointer-events-none absolute inset-0 opacity-30">
                <div className="absolute -inset-x-40 top-10 h-12 bg-gradient-to-r from-transparent via-white/10 to-transparent bg-[length:200%_100%] animate-shimmer"></div>
              </div>
            </div>

            <div className="rounded-2xl border border-white/10 bg-black/20 p-3">
              <div className="text-xs text-slate-300 flex items-center justify-between">
                <span>已上传文件</span>
                <button
                  type="button"
                  className="text-[11px] text-slate-400 hover:text-slate-200"
                  onClick={() => setFiles([])}
                >
                  清空
                </button>
              </div>
              <div className="mt-2 space-y-2">
                {files.length ? (
                  files.map((f, idx) => (
                    <div
                      key={`${f.name}-${idx}`}
                      className="flex items-center justify-between gap-3 rounded-xl border border-white/10 bg-white/5 px-3 py-2"
                    >
                      <div className="min-w-0">
                        <div className="truncate text-xs text-slate-100">{f.name}</div>
                        <div className="text-[11px] text-slate-500">
                          {Math.max(1, Math.round((f.size || 1024) / 1024))} KB
                        </div>
                      </div>
                      <span className="text-[10px] text-emerald-200 border border-emerald-400/20 bg-emerald-500/10 rounded-full px-2 py-1">
                        STORED
                      </span>
                    </div>
                  ))
                ) : (
                  <div className="text-xs text-slate-500 py-4 text-center">
                    尚无文件。你可以拖拽一个图表或数据文件进来。
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

      function DataTable({ rows }) {
        const [sort, setSort] = useState({ key: "updatedAt", dir: "desc" });
        const [query, setQuery] = useState("");
        const [page, setPage] = useState(1);
        const pageSize = 8;

        const filtered = useMemo(() => {
          const q = query.trim().toLowerCase();
          const base = q
            ? rows.filter((r) =>
                Object.values(r).some((v) => String(v).toLowerCase().includes(q))
              )
            : rows;
          const sorted = [...base].sort((a, b) => {
            const av = a[sort.key];
            const bv = b[sort.key];
            const cmp =
              av === bv ? 0 : av > bv ? 1 : -1;
            return sort.dir === "asc" ? cmp : -cmp;
          });
          return sorted;
        }, [rows, query, sort]);

        const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
        useEffect(() => {
          setPage(1);
        }, [query, sort.key, sort.dir]);

        const pageRows = filtered.slice((page - 1) * pageSize, page * pageSize);

        const th = (key, label) => (
          <button
            type="button"
            className="group inline-flex items-center gap-2 hover:text-white"
            onClick={() =>
              setSort((s) => ({
                key,
                dir: s.key === key ? (s.dir === "asc" ? "desc" : "asc") : "desc",
              }))
            }
          >
            <span>{label}</span>
            <span className="text-[10px] text-slate-500 group-hover:text-slate-300">
              {sort.key === key ? (sort.dir === "asc" ? "↑" : "↓") : "↕"}
            </span>
          </button>
        );

        return (
          <div className="rounded-2xl border border-white/10 bg-black/20 overflow-hidden">
            <div className="flex items-center justify-between gap-3 px-3 py-3 border-b border-white/10">
              <div className="text-xs text-slate-300">复杂表格控件（排序 / 搜索 / 分页）</div>
              <input
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                placeholder="搜索任意字段…"
                className="w-56 max-w-[55vw] rounded-xl border border-white/10 bg-black/40 px-3 py-2 text-xs text-slate-100 outline-none focus:border-indigo-400/40"
              />
            </div>

            <div className="overflow-auto">
              <table className="min-w-[860px] w-full text-left">
                <thead className="bg-slate-950/50">
                  <tr className="text-xs text-slate-400">
                    <th className="px-3 py-3">{th("title", "记录标题")}</th>
                    <th className="px-3 py-3">{th("project", "项目")}</th>
                    <th className="px-3 py-3">{th("owner", "负责人")}</th>
                    <th className="px-3 py-3">{th("status", "状态")}</th>
                    <th className="px-3 py-3">{th("updatedAt", "更新时间")}</th>
                    <th className="px-3 py-3">{th("tags", "标签")}</th>
                  </tr>
                </thead>
                <tbody>
                  {pageRows.map((r) => (
                    <tr
                      key={r.id}
                      className="border-t border-white/10 text-xs text-slate-200 hover:bg-white/5"
                    >
                      <td className="px-3 py-3">
                        <div className="font-medium text-slate-100">{r.title}</div>
                        <div className="text-[11px] text-slate-500">#{r.id}</div>
                      </td>
                      <td className="px-3 py-3 text-slate-300">{r.project}</td>
                      <td className="px-3 py-3 text-slate-300">{r.owner}</td>
                      <td className="px-3 py-3">
                        <span
                          className={cx(
                            "inline-flex items-center rounded-full border px-2 py-1 text-[10px]",
                            r.status === "进行中"
                              ? "border-amber-400/20 bg-amber-500/10 text-amber-200"
                              : r.status === "已归档"
                              ? "border-slate-400/20 bg-slate-500/10 text-slate-200"
                              : "border-emerald-400/20 bg-emerald-500/10 text-emerald-200"
                          )}
                        >
                          {r.status}
                        </span>
                      </td>
                      <td className="px-3 py-3 text-slate-400">{r.updatedAt}</td>
                      <td className="px-3 py-3">
                        <div className="flex flex-wrap gap-1">
                          {r.tags.map((t) => (
                            <span
                              key={t}
                              className="rounded-full border border-white/10 bg-white/5 px-2 py-1 text-[10px] text-slate-300"
                            >
                              {t}
                            </span>
                          ))}
                        </div>
                      </td>
                    </tr>
                  ))}
                  {!pageRows.length ? (
                    <tr className="border-t border-white/10">
                      <td className="px-3 py-6 text-center text-xs text-slate-500" colSpan={6}>
                        没有匹配的记录
                      </td>
                    </tr>
                  ) : null}
                </tbody>
              </table>
            </div>

            <div className="flex items-center justify-between px-3 py-3 border-t border-white/10 text-xs text-slate-400">
              <div>
                {filtered.length} 条 · 第 {page} / {totalPages} 页
              </div>
              <div className="flex items-center gap-2">
                <button
                  type="button"
                  className="rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-xs text-slate-200 hover:bg-white/10 disabled:opacity-40"
                  onClick={() => setPage((p) => Math.max(1, p - 1))}
                  disabled={page <= 1}
                >
                  上一页
                </button>
                <button
                  type="button"
                  className="rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-xs text-slate-200 hover:bg-white/10 disabled:opacity-40"
                  onClick={() => setPage((p) => Math.min(totalPages, p + 1))}
                  disabled={page >= totalPages}
                >
                  下一页
                </button>
              </div>
            </div>
          </div>
        );
      }

      function MiniChart({ title = "上传图表预览（模拟）" }) {
        const points = useMemo(() => {
          // 生成一条“实验曲线”
          const n = 18;
          const arr = [];
          let v = 42;
          for (let i = 0; i < n; i++) {
            v += (Math.random() - 0.45) * 12;
            v = Math.max(10, Math.min(95, v));
            arr.push(v);
          }
          return arr;
        }, []);

        const d = useMemo(() => {
          const w = 260,
            h = 84,
            pad = 8;
          const xs = points.map((_, i) => pad + (i * (w - pad * 2)) / (points.length - 1));
          const ys = points.map((p) => pad + ((100 - p) * (h - pad * 2)) / 100);
          let path = `M ${xs[0].toFixed(1)} ${ys[0].toFixed(1)}`;
          for (let i = 1; i < xs.length; i++) {
            path += ` L ${xs[i].toFixed(1)} ${ys[i].toFixed(1)}`;
          }
          return { path, w, h };
        }, [points]);

        return (
          <div className="rounded-2xl border border-white/10 bg-black/20 p-3">
            <div className="flex items-center justify-between">
              <div className="text-xs text-slate-300">{title}</div>
              <Badge tone="emerald">LIVE</Badge>
            </div>
            <div className="mt-3 flex items-center gap-3">
              <svg
                width="260"
                height="84"
                viewBox={`0 0 ${d.w} ${d.h}`}
                className="rounded-xl border border-white/10 bg-slate-950/40"
              >
                <defs>
                  <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0%" stopColor="rgba(99,102,241,.1)" />
                    <stop offset="50%" stopColor="rgba(99,102,241,.4)" />
                    <stop offset="100%" stopColor="rgba(16,185,129,.25)" />
                  </linearGradient>
                </defs>
                <path d={d.path} fill="none" stroke="url(#g1)" strokeWidth="2.4" />
                <path
                  d={`${d.path} L ${d.w - 8} ${d.h - 8} L 8 ${d.h - 8} Z`}
                  fill="rgba(99,102,241,.08)"
                />
              </svg>
              <div className="min-w-0 flex-1">
                <div className="text-xs text-slate-400">
                  自动生成的曲线用于呈现“上传→预览→分析”的 UX 流程。
                </div>
                <div className="mt-2 grid grid-cols-3 gap-2">
                  <div className="rounded-xl border border-white/10 bg-white/5 p-2">
                    <div className="text-[10px] text-slate-500">峰值</div>
                    <div className="mt-1 text-sm text-slate-100">
                      {Math.max(...points).toFixed(0)}
                    </div>
                  </div>
                  <div className="rounded-xl border border-white/10 bg-white/5 p-2">
                    <div className="text-[10px] text-slate-500">均值</div>
                    <div className="mt-1 text-sm text-slate-100">
                      {(points.reduce((a, b) => a + b, 0) / points.length).toFixed(0)}
                    </div>
                  </div>
                  <div className="rounded-xl border border-white/10 bg-white/5 p-2">
                    <div className="text-[10px] text-slate-500">斜率</div>
                    <div className="mt-1 text-sm text-slate-100">
                      {((points[points.length - 1] - points[0]) / points.length).toFixed(1)}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      function PageShell({ title, subtitle, children, actions }) {
        return (
          <div className="h-full flex flex-col">
            <div className="flex items-start justify-between gap-3">
              <div className="min-w-0">
                <div className="text-lg text-white truncate">{title}</div>
                {subtitle ? (
                  <div className="mt-1 text-xs text-slate-400">{subtitle}</div>

              </div>
              {actions ? <div className="shrink-0">{actions}</div> : null}
            </div>
            <div className="mt-4 flex-1 min-h-0">{children}</div>
          </div>
        );
      }

      function PlaceholderPage({ title, subtitle, blocks = 3 }) {
        const [query, setQuery] = useState("");
        const [status, setStatus] = useState("全部");
        const [draft, setDraft] = useState({
          name: "",
          owner: "Wei",
          priority: "中",
          note: "",
        });

        const rows = useMemo(() => {
          const base = Array.from({ length: 18 }).map((_, i) => ({
            id: 5000 + i,
            title: `${title} · Item ${i + 1}`,
            project: ["ALPHA", "BETA", "GAMMA", "DELTA"][i % 4],
            owner: ["Wei", "Lin", "Qian", "Zhou"][i % 4],
            status: ["进行中", "已完成", "已归档"][i % 3],
            updatedAt: `2026-03-${String(26 - (i % 9)).padStart(2, "0")} ${10 + (i % 9)}:${String(
              (i * 9) % 60
            ).padStart(2, "0")}`,
            tags: [["SOP"], ["审计"], ["模板"], ["通知"]][i % 4],
          }));
          const q = query.trim().toLowerCase();
          const filtered = base.filter((r) => {
            const hit = q
              ? Object.values(r).some((v) => String(v).toLowerCase().includes(q))
              : true;
            const st = status === "全部" ? true : r.status === status;
            return hit && st;
          });
          return filtered;
        }, [title, query, status]);

        const isLibrary = /文档资料库|SOP模板库/.test(title);
        const isGovernance = /权限配置|操作日志/.test(title);
        const isAccount = /登录|注册|账号安全|个人偏好/.test(title);

        return (
          <PageShell title={title} subtitle={subtitle} actions={<Badge tone="slate">VIEW</Badge>}>
            <div className="grid grid-cols-12 gap-4">
              <div className="col-span-12 xl:col-span-8 space-y-4">
                <Card title="搜索与筛选" right="快速定位">
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <input
                      value={query}
                      onChange={(e) => setQuery(e.target.value)}
                      placeholder="搜索任意字段…"
                      className="w-full rounded-2xl border border-white/10 bg-black/40 px-4 py-3 text-sm text-slate-100 outline-none focus:border-indigo-400/45"
                    />
                    <select
                      value={status}
                      onChange={(e) => setStatus(e.target.value)}
                      className="w-full rounded-2xl border border-white/10 bg-black/40 px-4 py-3 text-sm text-slate-100 outline-none focus:border-indigo-400/45"
                    >
                      <option>全部</option>
                      <option>进行中</option>
                      <option>已完成</option>
                      <option>已归档</option>
                    </select>
                    <button
                      type="button"
                      className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-slate-200 hover:bg-white/10 transition"
                      onClick={() => alert(`${title}：已执行批量操作（示例）。`)}
                    >
                      批量操作
                    </button>
                  </div>
                </Card>

                <Card title="数据视图" right="表格能力：排序 / 搜索 / 分页">
                  <DataTable rows={rows} />
                </Card>

                {blocks > 2 ? (
                  <Card title="流程面板" right="结构化">
                    <div className="grid grid-cols-3 gap-3 text-xs text-slate-300">
                      {[
                        ["输入", "表单/模板/参数"],
                        ["执行", "记录/附件/审阅"],
                        ["输出", "分析/报告/归档"],
                      ].map(([k, v]) => (
                        <div key={k} className="rounded-2xl border border-white/10 bg-white/5 p-3">
                          <div className="text-slate-100">{k}</div>
                          <div className="mt-1 text-slate-400">{v}</div>
                        </div>
                      ))}
                    </div>
                  </Card>
                ) : null}
              </div>

              <div className="col-span-12 xl:col-span-4 space-y-4">
                <Card title="创建 / 设置" right={isGovernance ? "策略" : isLibrary ? "入库" : "表单"}>
                  <div className="space-y-3">
                    <label className="block">
                      <div className="text-xs text-slate-400 mb-1">
                        {isAccount ? "显示名称" : isLibrary ? "标题" : "名称"}
                      </div>
                      <input
                        value={draft.name}
                        onChange={(e) => setDraft((d) => ({ ...d, name: e.target.value }))}
                        placeholder={isLibrary ? "例如：Protocol / Report / Template" : "例如：配置项 / 条目"}
                        className="w-full rounded-2xl border border-white/10 bg-black/40 px-4 py-3 text-sm text-slate-100 outline-none focus:border-indigo-400/45"
                      />
                    </label>

                    <div className="grid grid-cols-2 gap-3">
                      <label className="block">
                        <div className="text-xs text-slate-400 mb-1">{isGovernance ? "策略负责人" : "负责人"}</div>
                        <select
                          value={draft.owner}
                          onChange={(e) => setDraft((d) => ({ ...d, owner: e.target.value }))}
                          className="w-full rounded-2xl border border-white/10 bg-black/40 px-4 py-3 text-sm text-slate-100 outline-none focus:border-indigo-400/45"
                        >
                          <option>Wei</option>
                          <option>Lin</option>
                          <option>Qian</option>
                          <option>Zhou</option>
                        </select>
                      </label>
                      <label className="block">
                        <div className="text-xs text-slate-400 mb-1">{isAccount ? "等级" : "优先级"}</div>
                        <select
                          value={draft.priority}
                          onChange={(e) => setDraft((d) => ({ ...d, priority: e.target.value }))}
                          className="w-full rounded-2xl border border-white/10 bg-black/40 px-4 py-3 text-sm text-slate-100 outline-none focus:border-indigo-400/45"
                        >
                          <option>低</option>
                          <option>中</option>
                          <option>高</option>
                          <option>紧急</option>
                        </select>
                      </label>
                    </div>

                    <label className="block">
                      <div className="text-xs text-slate-400 mb-1">{isLibrary ? "备注/摘要" : "说明"}</div>
                      <textarea
                        value={draft.note}
                        onChange={(e) => setDraft((d) => ({ ...d, note: e.target.value }))}
                        placeholder={
                          isGovernance
                            ? "写明策略目的、范围、边界与审计点…"
                            : isLibrary
                            ? "写明内容摘要、版本、来源与适用范围…"
                            : "写明规则、流程与验收标准…"
                        }
                        className="w-full min-h-[110px] rounded-2xl border border-white/10 bg-black/40 px-4 py-3 text-sm text-slate-100 outline-none focus:border-indigo-400/45"
                      ></textarea>
                    </label>

                    <div className="flex items-center gap-2">
                      <button
                        type="button"
                        className="rounded-2xl border border-indigo-400/25 bg-indigo-500/10 px-4 py-3 text-sm text-white hover:bg-indigo-500/15 hover:border-indigo-300/35 transition shadow-glow"
                        onClick={() => {
                          alert(`${title}：已提交（示例）。`);
                          setDraft({ name: "", owner: "Wei", priority: "中", note: "" });
                        }}
                      >
                        提交
                      </button>
                      <button
                        type="button"
                        className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-slate-200 hover:bg-white/10 transition"
                        onClick={() => setDraft({ name: "", owner: "Wei", priority: "中", note: "" })}
                      >
                        清空
                      </button>
                    </div>
                  </div>
                </Card>

                <Card title="附件" right="拖拽上传">
                  <Dropzone
                    files={[]}
                    setFiles={() => {}}
                    uploading={false}
                    setUploading={() => {}}
                    hint="支持把资料/图表/数据拖拽到这里进行归档或关联。"
                  />
                </Card>

                <MiniChart title="趋势与指标" />
              </div>
            </div>
          </PageShell>
        );
      }

      function RbacView() {
        const resources = ["实验记录", "文档资料库", "SOP模板库", "团队", "权限配置", "审计日志"];
        const roles = ["Owner", "Admin", "Member", "Viewer"];
        const [matrix, setMatrix] = useState(() => {
          const m = {};
          for (const r of roles) for (const res of resources) for (const p of ["read", "write", "approve", "admin"]) m[`${r}:${res}:${p}`] = r === "Owner" ? true : p === "read";
          return m;
        });
        const toggle = (r, res, p) => setMatrix((m) => ({ ...m, [`${r}:${res}:${p}`]: !m[`${r}:${res}:${p}`] }));
        return (
          <PageShell title="权限配置" subtitle="RBAC 权限矩阵：角色 × 资源 × 动作。" actions={<Badge tone="indigo">RBAC</Badge>}>
            <Card title="权限矩阵" right="点击切换">
              <div className="rounded-2xl border border-white/10 bg-black/20 overflow-auto">
                <table className="min-w-[980px] w-full text-left">
                  <thead className="bg-slate-950/50">
                    <tr className="text-xs text-slate-400">
                      <th className="px-3 py-3">资源</th>
                      {roles.map((r) => (
                        <th key={r} className="px-3 py-3">{r}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {resources.map((res) => (
                      <tr key={res} className="border-t border-white/10 text-xs text-slate-200">
                        <td className="px-3 py-3 text-slate-100 font-medium">{res}</td>
                        {roles.map((r) => (
                          <td key={r} className="px-3 py-3">
                            <div className="flex flex-wrap gap-1">
                              {["read", "write", "approve", "admin"].map((p) => (
                                <button
                                  key={p}
                                  type="button"
                                  onClick={() => toggle(r, res, p)}
                                  className={cx(
                                    "rounded-full border px-2 py-1 text-[10px] transition",
                                    matrix[`${r}:${res}:${p}`]
                                      ? "border-emerald-400/20 bg-emerald-500/10 text-emerald-200"
                                      : "border-white/10 bg-white/5 text-slate-400 hover:bg-white/10"
                                  )}
                                >
                                  {p.toUpperCase()}
                                </button>
                              ))}
                            </div>
                          </td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </Card>
          </PageShell>
        );
      }

      function App() {
        const [activeId, setActiveId] = useState("dashboard");
        const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
        const [navOpen, setNavOpen] = useState({
          core: true,
          auth: false,
          project: true,
          record: true,
          governance: false,
          personal: false,
          support: false,
        });

        const [expModel, setExpModel] = useState({
          title: "",
          project: "Alpha",
          template: "标准实验记录",
          rich: "",
          files: [],
          uploading: false,
        });

        const demoStateRef = useRef({ running: false, done: false });
        const [demoState, setDemoState] = useState({ running: false, done: false });
        const [appData, setAppData] = useState(() => {
          try {
            const raw = localStorage.getItem("yunyan_app_data_v1");
            if (!raw) return createDefaultAppData();
            const parsed = JSON.parse(raw);
            return { ...createDefaultAppData(), ...parsed };
          } catch {
            return createDefaultAppData();
          }
        });

        const go = (id) => setActiveId(id);

        const appendLog = (action, target, result = "OK", actor = "Wei") => {
          setAppData((d) => ({
            ...d,
            logs: [
              {
                id: "L" + String(Date.now()).slice(-6),
                time: new Date().toLocaleString("zh-CN", { hour12: false }),
                actor,
                action,
                target,
                result,
              },
              ...d.logs,
            ],
          }));
        };

        useEffect(() => {
          try {
            localStorage.setItem("yunyan_app_data_v1", JSON.stringify(appData));
          } catch {}
        }, [appData]);

        // 快捷键（高效操作）
        useEffect(() => {
          const onKey = (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "b") {
              e.preventDefault();
              setSidebarCollapsed((v) => !v);
            }
            if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) {
              return;
            }
            const k = e.key.toLowerCase();
            if (k === "n") go("newExp");
            if (k === "g") go("records");
            if (k === "a") go("analytics");
          };
          window.addEventListener("keydown", onKey);
          return () => window.removeEventListener("keydown", onKey);
        }, []);

        // 仅首次进入 dashboard 时执行 ≥30秒 新手引导
        useEffect(() => {
          if (activeId !== "dashboard") return;
          const key = "yunyan_onboarding_v1_done";
          const already = localStorage.getItem(key) === "1";
          if (already) {
            demoStateRef.current = { running: false, done: true };
            setDemoState({ running: false, done: true });
            return;
          }
          if (demoStateRef.current.running) return;

          const run = async () => {
            demoStateRef.current = { running: true, done: false };
            setDemoState({ running: true, done: false });

            // 创建 overlay 元素：虚拟鼠标 + 点击波纹 + toast
            const cursor = document.createElement("div");
            cursor.className = "demo-cursor";
            const click = document.createElement("div");
            click.className = "demo-click";
            const toastWrap = document.createElement("div");
            toastWrap.className = "demo-toast";
            const toast = document.createElement("div");
            toast.className = "rounded-2xl px-4 py-3";
            toastWrap.appendChild(toast);
            document.body.appendChild(cursor);
            document.body.appendChild(click);
            document.body.appendChild(toastWrap);

            let spotlightCleanup = null;

            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

            const setToast = (title, desc) => {
              toast.innerHTML = `
                <div class="flex items-start gap-3">
                  <div class="mt-0.5 h-2.5 w-2.5 rounded-full bg-indigo-400/90 shadow-[0_0_0_2px_rgba(99,102,241,.18)]"></div>
                  <div class="min-w-0">
                    <div class="text-sm text-white">${title}</div>
                    <div class="mt-1 text-xs text-slate-300">${desc}</div>
                  </div>
                  <div class="ml-auto text-[10px] text-slate-500 border border-white/10 bg-white/5 rounded-full px-2 py-1">GUIDE</div>
                </div>
              `;
            };

            const rectOf = (el) => el.getBoundingClientRect();

            const moveCursorTo = async (x, y, ms = 900) => {
              const start = performance.now();
              const from = cursor.getBoundingClientRect();
              const fx = from.left;
              const fy = from.top;
              const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);
              const tick = (now) => {
                const t = Math.min(1, (now - start) / ms);
                const e = easeOutCubic(t);
                const nx = fx + (x - fx) * e;
                const ny = fy + (y - fy) * e;
                cursor.style.transform = `translate(${nx}px, ${ny}px)`;
                if (t < 1) requestAnimationFrame(tick);
              };
              requestAnimationFrame(tick);
              await sleep(ms);
            };

            const clickAt = async (x, y) => {
              click.style.transform = `translate(${x}px, ${y}px)`;
              click.style.opacity = "1";
              click.animate(
                [
                  { transform: `translate(${x}px, ${y}px) scale(.65)`, opacity: 0.9 },
                  { transform: `translate(${x}px, ${y}px) scale(1.15)`, opacity: 0 },
                ],
                { duration: 520, easing: "ease-out" }
              );
              await sleep(240);
              click.style.opacity = "0";
            };

            const spotlight = (el) => {
              if (!el) return () => {};
              const prevPos = el.style.position;
              const prevZ = el.style.zIndex;
              const prevOverflow = el.style.overflow;
              if (getComputedStyle(el).position === "static") {
                el.style.position = "relative";
              }
              el.style.zIndex = "999996";
              el.style.overflow = "visible";
              const s = document.createElement("div");
              s.className = "demo-spotlight";
              const ring = document.createElement("div");
              ring.className = "demo-ring animate-pulseRing";
              el.appendChild(s);
              el.appendChild(ring);
              return () => {
                try {
                  s.remove();
                  ring.remove();
                } catch {}
                el.style.position = prevPos;
                el.style.zIndex = prevZ;
                el.style.overflow = prevOverflow;
              };
            };

            const moveToElCenter = async (el, ms = 900, yBias = 0) => {
              const r = rectOf(el);
              const x = r.left + r.width * 0.55;
              const y = r.top + r.height * 0.55 + yBias;
              await moveCursorTo(x, y, ms);
              return { x, y };
            };

            const safeGet = (id) => document.getElementById(id);

            const cleanup = () => {
              try {
                spotlightCleanup?.();
              } catch {}
              try {
                cursor.remove();
                click.remove();
                toastWrap.remove();
              } catch {}
            };

            // 确保时长 ≥30秒：脚本以时间片构成，目标约 36-42 秒
            try {
              // 0) 开场
              setToast("欢迎来到 云研 ELN", "新手引导将带你完成：新建实验 → 填写 → 上传附件 → 数据分析。");
              await sleep(2400);

              // 1) 聚焦“新建实验”按钮并点击
              const newBtn = safeGet("demo-newexp-btn");
              if (newBtn) {
                spotlightCleanup = spotlight(newBtn);
                await sleep(1200);
                const { x, y } = await moveToElCenter(newBtn, 1200);
                await sleep(500);
                await clickAt(x, y);
                await sleep(400);
                newBtn.click();
              }
              spotlightCleanup?.();
              spotlightCleanup = null;

              setToast("步骤 1/3", "已进入「新建实验」。现在录入标题并完善关键字段。");
              await sleep(2200);

              // 2) 输入标题（模拟逐字输入）
              const titleInput = safeGet("demo-exp-title");
              if (titleInput) {
                titleInput.scrollIntoView({ behavior: "smooth", block: "center" });
                await sleep(900);
                spotlightCleanup = spotlight(titleInput);
                await sleep(900);
                const { x, y } = await moveToElCenter(titleInput, 900, 0);
                await clickAt(x, y);
                titleInput.focus();
                await sleep(520);

                const text = "蛋白纯化 · 缓冲液优化 · Run 03（云研）";
                // 逐字输入，控制节奏以拉长引导时长
                for (let i = 0; i < text.length; i++) {
                  const v = text.slice(0, i + 1);
                  titleInput.value = v;
                  titleInput.dispatchEvent(new Event("input", { bubbles: true }));
                  await sleep(85);
                }
                await sleep(900);
              }
              spotlightCleanup?.();
              spotlightCleanup = null;

              // 3) 停留说明（让用户看到 UI 信息密度）
              setToast("步骤 2/3", "标题已录入。接下来上传图表/数据，并在附件列表确认。");
              await sleep(2600);

              // 4) 移动到上传区，模拟拖放与进度
              const uploadZone = safeGet("demo-upload-zone");
              if (uploadZone) {
                uploadZone.scrollIntoView({ behavior: "smooth", block: "center" });
                await sleep(900);
                spotlightCleanup = spotlight(uploadZone);
                await sleep(900);
                const { x, y } = await moveToElCenter(uploadZone, 1200, 10);
                await sleep(420);
                await clickAt(x, y);
                await sleep(520);

                // 触发模拟上传（不依赖真实文件）：通过一个自定义事件，让组件感知“引导上传”
                window.dispatchEvent(
                  new CustomEvent("yunyan_demo_upload", {
                    detail: {
                      files: [
                        { name: "chart_run03.png", size: 278234 },
                        { name: "raw_signal_run03.csv", size: 90214 },
                      ],
                    },
                  })
                );
              }
              spotlightCleanup?.();
              spotlightCleanup = null;

              // 5) 等待模拟上传完成 + 解释
              setToast("步骤 3/3", "附件已上传。下一步进入「数据图表分析」查看趋势与异常点。");
              await sleep(5200);

              // 6) 跳转分析页并停留一段时间，确保总时长
              setActiveId("analytics");
              await sleep(900);
              setToast("分析视图", "在此进行筛选、对照与异常定位，并可生成分析报告。");
              await sleep(5400);

              // 7) 回到工作台，收尾
              setActiveId("dashboard");
              await sleep(900);
              setToast("引导完成", "你已完成核心闭环：新建 → 填写 → 上传 → 分析。可在右上角手动重播引导。");
              await sleep(4200);

              localStorage.setItem(key, "1");
              demoStateRef.current = { running: false, done: true };
              setDemoState({ running: false, done: true });
            } catch (e) {
              console.error(e);
              demoStateRef.current = { running: false, done: false };
              setDemoState({ running: false, done: false });
            } finally {
              cleanup();
            }
          };

          run();
        }, [activeId]);

        // Demo 上传事件：让 onboarding 可以触发“假文件上传”
        // 事件监听放在 Dropzone 内部（用于显示进度条），这里不重复处理避免附件双份

        const activeName = PAGES.find((p) => p.id === activeId)?.name || activeId;

        const view = useMemo(() => {
          switch (activeId) {
            case "dashboard":
              return <DashboardView go={go} demoState={demoState} />;
            case "newExp":
              return (
                <NewExperimentView
                  model={expModel}
                  setModel={setExpModel}
                  onSave={(m) => {
                    const id = String(Date.now()).slice(-6);
                    const rec = {
                      id,
                      title: m.title || `新实验 ${id}`,
                      project: (m.project || "Alpha").toUpperCase(),
                      owner: "Wei",
                      status: "进行中",
                      updatedAt: new Date().toLocaleString("zh-CN", { hour12: false }),
                      tags: ["手动创建", m.template || "模板"],
                    };
                    setAppData((d) => ({
                      ...d,
                      records: [rec, ...d.records],
                      activeRecordId: id,
                    }));
                    appendLog("CREATE", `Record#${id}`);
                  }}
                />
              );
            case "analytics":
              return <AnalyticsView />;
            case "records":
              return <RecordsView go={go} rows={appData.records} setAppData={setAppData} appendLog={appendLog} />;
            case "recordReadonly":
              return <RecordReadonlyView go={go} id={appData.activeRecordId} appendLog={appendLog} />;
            case "projects":
              return <ProjectsView go={go} projects={appData.projects} setAppData={setAppData} appendLog={appendLog} />;
            case "projectDetail":
              return <ProjectDetailView go={go} activeProjectId={appData.activeProjectId} records={appData.records} />;
            case "docs":
              return <DocsView docs={appData.docs} setAppData={setAppData} appendLog={appendLog} />;
            case "sop":
              return <SopView sops={appData.sops} setAppData={setAppData} appendLog={appendLog} />;
            case "team":
              return <TeamView members={appData.members} setAppData={setAppData} appendLog={appendLog} />;
            case "rbac":
              return <RbacView />;
            case "audit":
              return <AuditView logs={appData.logs} />;
            case "inbox":
              return <InboxView messages={appData.messages} setAppData={setAppData} appendLog={appendLog} />;
            case "prefs":
              return <PrefsView prefs={appData.prefs} setAppData={setAppData} appendLog={appendLog} />;
            case "security":
              return <SecurityView security={appData.security} setAppData={setAppData} appendLog={appendLog} />;
            case "storage":
              return <StorageView storage={appData.storage} />;
            case "helpdesk":
              return <HelpdeskView tickets={appData.tickets} setAppData={setAppData} appendLog={appendLog} />;
            case "login":
              return <LoginView go={go} />;
            case "register":
              return <RegisterView go={go} />;
            case "landing":
              return <LandingView go={go} />;
            default:
              return (
                <PlaceholderPage
                  title={activeName}
                  subtitle="该页面已注册到 20 视图导航。"
                  blocks={2}
                />
              );
          }
        }, [activeId, demoState, expModel, appData]);

        return (
          <div className="h-screen w-screen overflow-hidden">
            <div className="h-full flex">
              {/* Sidebar */}
              <aside
                className={cx(
                  "h-full border-r border-white/10 bg-slate-950/60 backdrop-blur flex flex-col transition-all duration-200",
                  sidebarCollapsed ? "w-[72px]" : "w-[320px]"
                )}
              >
                <div className="p-3 border-b border-white/10">
                  <div className="flex items-center justify-between gap-2">
                    <button
                      type="button"
                      className="flex items-center gap-3 rounded-2xl border border-white/10 bg-white/5 px-3 py-2 hover:bg-white/10 transition w-full"
                      onClick={() => go("dashboard")}
                      title="返回工作台"
                    >
                      <div className="h-8 w-8 rounded-xl bg-indigo-500/15 border border-indigo-400/25 shadow-glow flex items-center justify-center text-indigo-100 text-sm">
                        云
                      </div>
                      {!sidebarCollapsed ? (
                        <div className="min-w-0">
                          <div className="text-sm text-white leading-tight">云研</div>
                          <div className="text-[10px] text-slate-500 leading-tight truncate">
                            ELN · SaaS
                          </div>
                        </div>
                      ) : null}
                    </button>
                    <button
                      type="button"
                      className="shrink-0 rounded-2xl border border-white/10 bg-white/5 px-3 py-2 text-xs text-slate-200 hover:bg-white/10 transition"
                      onClick={() => setSidebarCollapsed((v) => !v)}
                      title="折叠/展开 (Ctrl+B)"
                    >
                      {sidebarCollapsed ? "→" : "←"}
                    </button>
                  </div>
                </div>

                <div className="flex-1 overflow-auto p-3">
                  <div className="flex items-center justify-between">
                    {!sidebarCollapsed ? (
                      <div className="text-[10px] tracking-widest text-slate-500">
                        NAVIGATION TREE
                      </div>
                    ) : (
                      <div className="text-[10px] tracking-widest text-slate-500">NAV</div>
                    )}
                    {!sidebarCollapsed ? (
                      <div className="text-[10px] text-slate-600">20 views</div>
                    ) : null}
                  </div>

                  <TreeSection
                    title={sidebarCollapsed ? "CORE" : "核心"}
                    defaultOpen={navOpen.core}
                  >
                    <NavItem
                      active={activeId === "dashboard"}
                      label={sidebarCollapsed ? "看板" : "工作台看板"}
                      onClick={() => go("dashboard")}
                      idForDemo="demo-nav-dashboard"
                    />
                    <NavItem
                      active={activeId === "newExp"}
                      label={sidebarCollapsed ? "新建" : "新建实验"}
                      onClick={() => go("newExp")}
                      idForDemo="demo-nav-newexp"
                    />
                  </TreeSection>

                  <TreeSection title={sidebarCollapsed ? "AUTH" : "账号"} defaultOpen={navOpen.auth}>
                    <NavItem
                      active={activeId === "login"}
                      label={sidebarCollapsed ? "登录" : "登录"}
                      onClick={() => go("login")}
                    />
                    <NavItem
                      active={activeId === "register"}
                      label={sidebarCollapsed ? "注册" : "注册"}
                      onClick={() => go("register")}
                    />
                    <NavItem
                      active={activeId === "security"}
                      label={sidebarCollapsed ? "安全" : "账号安全"}
                      onClick={() => go("security")}
                    />
                  </TreeSection>

                  <TreeSection
                    title={sidebarCollapsed ? "PRODUCT" : "产品"}
                    defaultOpen={navOpen.project}
                  >
                    <NavItem
                      active={activeId === "landing"}
                      label={sidebarCollapsed ? "官网" : "产品官网Landing"}
                      onClick={() => go("landing")}
                    />
                    <NavItem
                      active={activeId === "projects"}
                      label={sidebarCollapsed ? "项目" : "项目管理"}
                      onClick={() => go("projects")}
                    />
                    <NavItem
                      active={activeId === "projectDetail"}
                      label={sidebarCollapsed ? "详情" : "项目详情"}
                      onClick={() => go("projectDetail")}
                    />
                  </TreeSection>

                  <TreeSection
                    title={sidebarCollapsed ? "RECORDS" : "实验记录"}
                    defaultOpen={navOpen.record}
                  >
                    <NavItem
                      active={activeId === "records"}
                      label={sidebarCollapsed ? "列表" : "实验记录列表"}
                      onClick={() => go("records")}
                    />
                    <NavItem
                      active={activeId === "recordReadonly"}
                      label={sidebarCollapsed ? "预览" : "实验只读预览"}
                      onClick={() => go("recordReadonly")}
                    />
                    <NavItem
                      active={activeId === "analytics"}
                      label={sidebarCollapsed ? "分析" : "数据图表分析"}
                      onClick={() => go("analytics")}
                    />
                    <NavItem
                      active={activeId === "docs"}
                      label={sidebarCollapsed ? "文库" : "文档资料库"}
                      onClick={() => go("docs")}
                    />
                    <NavItem
                      active={activeId === "sop"}
                      label={sidebarCollapsed ? "SOP" : "SOP模板库"}
                      onClick={() => go("sop")}
                    />
                  </TreeSection>

                  <TreeSection
                    title={sidebarCollapsed ? "GOV" : "治理"}
                    defaultOpen={navOpen.governance}
                  >
                    <NavItem
                      active={activeId === "team"}
                      label={sidebarCollapsed ? "成员" : "团队成员管理"}
                      onClick={() => go("team")}
                    />
                    <NavItem
                      active={activeId === "rbac"}
                      label={sidebarCollapsed ? "权限" : "权限配置"}
                      onClick={() => go("rbac")}
                    />
                    <NavItem
                      active={activeId === "audit"}
                      label={sidebarCollapsed ? "日志" : "操作日志"}
                      onClick={() => go("audit")}
                    />
                  </TreeSection>

                  <TreeSection
                    title={sidebarCollapsed ? "ME" : "个人"}
                    defaultOpen={navOpen.personal}
                  >
                    <NavItem
                      active={activeId === "prefs"}
                      label={sidebarCollapsed ? "偏好" : "个人偏好"}
                      onClick={() => go("prefs")}
                    />
                    <NavItem
                      active={activeId === "storage"}
                      label={sidebarCollapsed ? "存储" : "存储空间分析"}
                      onClick={() => go("storage")}
                    />
                    <NavItem
                      active={activeId === "inbox"}
                      label={sidebarCollapsed ? "通知" : "站内信通知"}
                      onClick={() => go("inbox")}
                    />
                  </TreeSection>

                  <TreeSection
                    title={sidebarCollapsed ? "HELP" : "支持"}
                    defaultOpen={navOpen.support}
                  >
                    <NavItem
                      active={activeId === "helpdesk"}
                      label={sidebarCollapsed ? "工单" : "帮助文档工单"}
                      onClick={() => go("helpdesk")}
                    />
                  </TreeSection>
                </div>

                <div className="p-3 border-t border-white/10">
                  <div
                    className={cx(
                      "rounded-2xl border border-white/10 bg-black/25 p-3",
                      sidebarCollapsed ? "text-center" : ""
                    )}
                  >
                    {!sidebarCollapsed ? (
                      <>
                        <div className="text-xs text-slate-300">状态</div>
                        <div className="mt-2 flex flex-wrap items-center gap-2">
                          <Badge tone="emerald">ONLINE</Badge>
                          <Badge tone="slate">{activeName}</Badge>
                        </div>
                        <div className="mt-2 text-[10px] text-slate-500">
                          首次进入看板将自动触发新手引导。你也可以在右上角手动重播。
                        </div>
                      </>
                    ) : (
                      <div className="text-[10px] text-slate-500">OK</div>
                    )}
                  </div>
                </div>
              </aside>

              {/* Main */}
              <main className="flex-1 min-w-0 h-full overflow-hidden">
                <div className="h-full flex flex-col">
                  <header className="border-b border-white/10 bg-slate-950/40 backdrop-blur">
                    <div className="px-5 py-4 flex items-center justify-between gap-3">
                      <div className="min-w-0">
                        <div className="text-xs text-slate-500 tracking-widest">YUNYAN · ELN</div>
                        <div className="mt-1 text-sm text-white truncate">{activeName}</div>
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="hidden md:flex items-center gap-2">
                          <span className="text-[10px] text-slate-500">快捷键</span>
                          <span className="text-[10px] text-slate-300 border border-white/10 bg-white/5 rounded-full px-2 py-1">
                            N 新建
                          </span>
                          <span className="text-[10px] text-slate-300 border border-white/10 bg-white/5 rounded-full px-2 py-1">
                            G 列表
                          </span>
                          <span className="text-[10px] text-slate-300 border border-white/10 bg-white/5 rounded-full px-2 py-1">
                            A 分析
                          </span>
                          <span className="text-[10px] text-slate-300 border border-white/10 bg-white/5 rounded-full px-2 py-1">
                            Ctrl+B 侧栏
                          </span>
                        </div>
                        <button
                          type="button"
                          className="rounded-2xl border border-white/10 bg-white/5 px-4 py-2 text-xs text-slate-200 hover:bg-white/10 transition"
                          onClick={() => {
                            localStorage.removeItem("yunyan_onboarding_v1_done");
                            alert("已清除引导标记。回到「工作台看板」将再次自动启动引导。");
                          }}
                        >
                          重播引导
                        </button>
                      </div>
                    </div>
                  </header>

                  <div className="flex-1 min-h-0 overflow-auto">
                    <div className="p-5 h-full">{view}</div>
                  </div>
                </div>
              </main>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
